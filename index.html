<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Integration Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
}

#sidebar{
    width:350px;
    background:#f5f5f5;
    overflow:auto;
    padding:15px;
    box-sizing:border-box;
    border-right:1px solid #ccc;
}

#graphContainer{
    flex:1;
    position:relative;
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

h2{
    margin-top:0;
}

.function-row{
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
}

.function-row input[type=text]{
    width:100%;
    box-sizing:border-box;
    margin-top:5px;
}

button{
    cursor:pointer;
}

.result-box{
    background:white;
    padding:10px;
    border-radius:8px;
    margin-top:15px;
    border:1px solid #ddd;
}

.small{
    font-size:13px;
    color:#555;
}
</style>
</head>
<body>

<div id="sidebar">

<h2>Integration Calculator</h2>

<button onclick="addFunction()">+ Add Function</button>

<div id="functions"></div>

<div class="result-box">
<h3>Definite Integral</h3>

<label>Function #</label>
<select id="integralFunction"></select>

<br><br>

<label>a:</label>
<input id="a" type="number" value="0">

<label>b:</label>
<input id="b" type="number" value="5">

<br><br>

<button onclick="calculateIntegral()">
Calculate Area
</button>

<p id="integralResult">Area =</p>
</div>

<div class="result-box">
<h3>View Settings</h3>

<label>X Min</label>
<input id="xmin" type="number" value="-10">

<label>X Max</label>
<input id="xmax" type="number" value="10">

<br><br>

<label>Y Min</label>
<input id="ymin" type="number" value="-10">

<label>Y Max</label>
<input id="ymax" type="number" value="10">

<br><br>

<button onclick="drawGraph()">
Update View
</button>
</div>

<div class="result-box">
<h3>Function Help</h3>

<div class="small">
sin(x)<br>
cos(x)<br>
tan(x)<br>
sqrt(x)<br>
log(x)<br>
exp(x)<br>
x^2<br>
3*x+1<br>
sin(x)+x^2
</div>
</div>

</div>

<div id="graphContainer">
<canvas id="graph"></canvas>
</div>

<script>

const canvas=document.getElementById('graph');
const ctx=canvas.getContext('2d');

let functions=[];

function resizeCanvas(){
    canvas.width=canvas.parentElement.clientWidth;
    canvas.height=canvas.parentElement.clientHeight;
    drawGraph();
}

window.addEventListener('resize',resizeCanvas);

function addFunction(expr='x^2'){
    functions.push({
        expr:expr,
        color:'#'+Math.floor(Math.random()*16777215).toString(16),
        visible:true
    });

    refreshFunctionList();
}

function removeFunction(i){
    functions.splice(i,1);
    refreshFunctionList();
    drawGraph();
}

function refreshFunctionList(){

    const div=document.getElementById('functions');
    div.innerHTML='';

    const select=document.getElementById('integralFunction');
    select.innerHTML='';

    functions.forEach((f,i)=>{

        const row=document.createElement('div');
        row.className='function-row';

        row.innerHTML=`
        <b>Function ${i+1}</b>
        <br>

        <input type="checkbox"
        ${f.visible?'checked':''}
        onchange="toggleFunction(${i},this.checked)">
        Show

        <br><br>

        Color:
        <input type="color"
        value="${f.color}"
        onchange="changeColor(${i},this.value)">

        <br><br>

        f(x)=
        <input type="text"
        value="${f.expr}"
        onchange="changeExpr(${i},this.value)">

        <br><br>

        <button onclick="showDerivative(${i})">
        Derivative
        </button>

        <button onclick="removeFunction(${i})">
        Delete
        </button>

        <div id="deriv${i}" class="small"></div>
        `;

        div.appendChild(row);

        const opt=document.createElement('option');
        opt.value=i;
        opt.textContent=`Function ${i+1}`;
        select.appendChild(opt);
    });

    drawGraph();
}

function toggleFunction(i,val){
    functions[i].visible=val;
    drawGraph();
}

function changeExpr(i,val){
    functions[i].expr=val;
    drawGraph();
}

function changeColor(i,val){
    functions[i].color=val;
    drawGraph();
}

function showDerivative(i){

    try{

        const derivative=math.derivative(
            functions[i].expr,
            'x'
        ).toString();

        document.getElementById(
            'deriv'+i
        ).innerHTML=
        'f\'(x) = '+derivative;

    }catch(e){

        document.getElementById(
            'deriv'+i
        ).innerHTML='Invalid function';
    }
}

function getBounds(){

    return {
        xmin:Number(document.getElementById('xmin').value),
        xmax:Number(document.getElementById('xmax').value),
        ymin:Number(document.getElementById('ymin').value),
        ymax:Number(document.getElementById('ymax').value)
    };
}

function xToCanvas(x,b){
    return (x-b.xmin)/(b.xmax-b.xmin)*canvas.width;
}

function yToCanvas(y,b){
    return canvas.height-
    (y-b.ymin)/(b.ymax-b.ymin)*canvas.height;
}

function drawAxes(b){

    ctx.strokeStyle='#888';
    ctx.lineWidth=1;

    const x0=xToCanvas(0,b);
    const y0=yToCanvas(0,b);

    ctx.beginPath();
    ctx.moveTo(0,y0);
    ctx.lineTo(canvas.width,y0);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x0,0);
    ctx.lineTo(x0,canvas.height);
    ctx.stroke();
}

function drawGraph(){

    const b=getBounds();

    ctx.clearRect(
        0,0,
        canvas.width,
        canvas.height
    );

    drawAxes(b);

    functions.forEach(f=>{

        if(!f.visible) return;

        try{

            const expr=
            math.compile(f.expr);

            ctx.strokeStyle=f.color;
            ctx.lineWidth=2;

            let started=false;

            ctx.beginPath();

            for(let px=0;
                px<canvas.width;
                px++){

                const x=
                b.xmin+
                px/canvas.width*
                (b.xmax-b.xmin);

                const y=
                expr.evaluate({x});

                const py=
                yToCanvas(y,b);

                if(!isFinite(py))
                    continue;

                if(!started){
                    ctx.moveTo(px,py);
                    started=true;
                }else{
                    ctx.lineTo(px,py);
                }
            }

            ctx.stroke();

        }catch(e){}
    });
}

function calculateIntegral(){

    const idx=
    Number(
    document.getElementById(
    'integralFunction').value);

    const a=
    Number(
    document.getElementById('a').value);

    const b=
    Number(
    document.getElementById('b').value);

    try{

        const expr=
        math.compile(
        functions[idx].expr);

        let area=0;

        const n=5000;
        const dx=(b-a)/n;

        for(let i=0;i<n;i++){

            const x=a+i*dx;

            area+=
            expr.evaluate({x})*dx;
        }

        document.getElementById(
        'integralResult'
        ).innerHTML=
        'Area = '+
        area.toFixed(8);

        shadeIntegral(
            functions[idx],
            a,b
        );

    }catch(e){

        alert("Invalid function");
    }
}

function shadeIntegral(func,a,b){

    drawGraph();

    const bounds=getBounds();

    const expr=
    math.compile(func.expr);

    ctx.fillStyle=
    func.color+'55';

    ctx.beginPath();

    ctx.moveTo(
    xToCanvas(a,bounds),
    yToCanvas(0,bounds));

    for(let i=0;i<=500;i++){

        const x=
        a+(b-a)*i/500;

        const y=
        expr.evaluate({x});

        ctx.lineTo(
        xToCanvas(x,bounds),
        yToCanvas(y,bounds));
    }

    ctx.lineTo(
    xToCanvas(b,bounds),
    yToCanvas(0,bounds));

    ctx.closePath();
    ctx.fill();
}

addFunction("x^2");
addFunction("sin(x)");

resizeCanvas();

</script>

</body>
</html>
